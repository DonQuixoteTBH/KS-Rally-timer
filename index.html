<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Web Dashboard</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #0A0A0A; color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center;
        }
        .container { width: 90%; max-width: 400px; background: #1A1A1A; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #00E5FF; font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .clock { font-size: 3rem; font-weight: 900; font-family: monospace; color: #FFFFFF; margin: 10px 0; }
        .status { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
        .active { color: #00E5FF !important; }
        .target-section { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }

        /* Compass Layout */
        .target-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }
        .target-input {
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            padding: 14px 0;
            text-align: center;
            cursor: pointer;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .target-input.selected { background: #00E5FF; color: black; border: none; box-shadow: 0 0 15px rgba(0,229,255,0.4); }
        .empty-cell { visibility: hidden; }

        input[type="text"] { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; text-align: center; margin-bottom: 15px; }
        button { background: #00E5FF; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; color: black; font-size: 1rem; text-transform: uppercase; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .countdown { font-size: 1.5rem; color: #E91E63; font-weight: bold; margin-top: 15px; display: none; font-family: monospace; font-variant-numeric: tabular-nums; }
        .stealth-btn { background: #E91E63; margin-top: 10px; font-size: 0.8rem; color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .stealth-btn.active { background: #4CAF50; }
    </style>
</head>
<body>

    <div class="container" id="setupView">
        <h1>Sync Access</h1>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Enter your squad unit to begin.</p>
        <input type="text" id="teamInput" placeholder="SQUAD UNIT (e.g. T1)" value="T1">
        <button onclick="startApp()">Link Unit</button>
    </div>

    <div class="container" id="mainView" style="display: none;">
        <h1 id="headerTeam">SQUAD UNIT</h1>
        <div class="clock" id="currentTime">00:00:00</div>
        <div class="status" id="statusText">Awaiting Target Data...</div>

        <div class="target-section">
            <p style="color: #666; font-size: 0.7rem; margin-bottom: 15px; text-transform: uppercase;">Compass Selection</p>
            <div class="target-inputs">
                <div class="empty-cell"></div>
                <div class="target-input" id="t1" onclick="selectTarget(1)">North</div>
                <div class="empty-cell"></div>

                <div class="target-input" id="t4" onclick="selectTarget(4)">West</div>
                <div class="target-input" id="t5" onclick="selectTarget(5)">Castle</div>
                <div class="target-input" id="t3" onclick="selectTarget(3)">East</div>

                <div class="empty-cell"></div>
                <div class="target-input" id="t2" onclick="selectTarget(2)">South</div>
                <div class="empty-cell"></div>
            </div>
            <p style="color: #666; font-size: 0.6rem; margin-bottom: 10px; text-transform: uppercase;">Travel Time (HH:MM:SS)</p>
            <input type="text" id="travelInput" placeholder="00:00:00" maxlength="8">
        </div>

        <div class="countdown" id="countdown">BEEP IN: 00:00</div>

        <button id="stealthBtn" class="stealth-btn" onclick="toggleStealth()">ENABLE BACKGROUND SYNC</button>
        <p style="color: #444; font-size: 0.6rem; margin-top: 10px;">Tap to keep timer alive while in game</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVRDYoTzgL9JT3CsCWu6Dm_JP8ppyndhU",
            databaseURL: "https://ks-rally-timer-default-rtdb.firebaseio.com/",
            projectId: "ks-rally-timer",
            storageBucket: "ks-rally-timer.firebasestorage.app",
            appId: "1:181688095663:android:88b598bbb1bc174363555a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentTeam = "";
        let nextBeepTime = null;
        let selectedIndex = 5;
        let travelTimes = ["00:00:00", "00:00:00", "00:00:00", "00:00:00", "00:00:00"];
        let serverTimeOffset = 0;

        let audioCtx = null;
        let silentBuffer = null;
        let isStealthEnabled = false;

        const storedTimes = localStorage.getItem('travelTimes');
        if (storedTimes) travelTimes = JSON.parse(storedTimes);

        database.ref('.info/serverTimeOffset').on('value', (snapshot) => {
            serverTimeOffset = snapshot.val() || 0;
            console.log("Server time offset updated:", serverTimeOffset);
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                silentBuffer = audioCtx.createBuffer(1, 44100, 44100);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleStealth() {
            initAudio();
            isStealthEnabled = !isStealthEnabled;
            const btn = document.getElementById('stealthBtn');
            if (isStealthEnabled) {
                btn.innerText = "BACKGROUND SYNC: ACTIVE";
                btn.classList.add('active');
                playSilentLoop();
            } else {
                btn.innerText = "ENABLE BACKGROUND SYNC";
                btn.classList.remove('active');
            }
        }

        function playSilentLoop() {
            if (!isStealthEnabled || !audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = silentBuffer;
            source.connect(audioCtx.destination);
            source.onended = playSilentLoop;
            source.start();
        }

        function startApp() {
            currentTeam = document.getElementById('teamInput').value.toUpperCase();
            if (!currentTeam) return;
            document.getElementById('setupView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
            document.getElementById('headerTeam').innerText = "SQUAD " + currentTeam;
            updateTargetUI();
            initAudio();
            listenToFirebase();
        }

        function selectTarget(idx) {
            selectedIndex = idx;
            updateTargetUI();
        }

        function listenToFirebase() {
            database.ref('teams/' + currentTeam).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                const targetTime = data.targetTime;
                const targetIdx = data.targetIndex || 5;
                const isStarted = data.isStarted;
                const prepMins = data.prepMins || 1;

                selectedIndex = targetIdx;
                updateTargetUI();

                if (isStarted && targetTime) {
                    calculateNextBeep(targetTime, travelTimes[selectedIndex - 1], prepMins);
                    const names = ["NORTH", "SOUTH", "EAST", "WEST", "CASTLE"];
                    document.getElementById('statusText').innerText = "LINKED - " + names[selectedIndex-1];
                    document.getElementById('statusText').classList.add('active');
                } else {
                    nextBeepTime = null;
                    document.getElementById('statusText').innerText = "STANDBY - Waiting for Leader";
                    document.getElementById('statusText').classList.remove('active');
                }
            });
        }

        function calculateNextBeep(targetStr, travelStr, prep) {
            try {
                const now = new Date(Date.now() + serverTimeOffset);
                const targetDate = new Date(now.getTime());
                const parts = targetStr.split(':');
                targetDate.setUTCHours(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]), 0);
                const tParts = travelStr.split(':');
                if (tParts.length === 3) {
                    targetDate.setUTCHours(targetDate.getUTCHours() - parseInt(tParts[0]));
                    targetDate.setUTCMinutes(targetDate.getUTCMinutes() - parseInt(tParts[1]));
                    targetDate.setUTCSeconds(targetDate.getUTCSeconds() - parseInt(tParts[2]));
                }
                targetDate.setUTCMinutes(targetDate.getUTCMinutes() - prep);
                if (targetDate.getTime() < now.getTime() - 600000) targetDate.setUTCDate(targetDate.getUTCDate() + 1);
                nextBeepTime = targetDate.getTime();
            } catch (e) { console.error(e); }
        }

        function updateTargetUI() {
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById('t' + i);
                if (i === selectedIndex) el.classList.add('selected');
                else el.classList.remove('selected');
            }
            document.getElementById('travelInput').value = travelTimes[selectedIndex - 1];
        }

        document.getElementById('travelInput').addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '').slice(0, 6);
            let formatted = "";
            for (let i = 0; i < val.length; i++) {
                formatted += val[i];
                if ((i === 1 || i === 3) && i !== val.length - 1) formatted += ":";
            }
            e.target.value = formatted;
            travelTimes[selectedIndex - 1] = formatted;
            localStorage.setItem('travelTimes', JSON.stringify(travelTimes));
        });

        setInterval(() => {
            const now = new Date(Date.now() + serverTimeOffset);
            const h = now.getUTCHours().toString().padStart(2, '0');
            const m = now.getUTCMinutes().toString().padStart(2, '0');
            const s = now.getUTCSeconds().toString().padStart(2, '0');
            document.getElementById('currentTime').innerText = `${h}:${m}:${s}`;
            if (nextBeepTime) {
                const diff = nextBeepTime - now.getTime();
                if (diff > 0) {
                    document.getElementById('countdown').style.display = 'block';
                    const minRem = Math.floor(diff / 60000);
                    const secRem = Math.floor(diff / 1000) % 60;
                    const msRem = Math.floor((diff % 1000) / 10);
                    document.getElementById('countdown').innerText = "BEEP IN: " +
                        minRem.toString().padStart(2, '0') + ":" +
                        secRem.toString().padStart(2, '0') + "." +
                        msRem.toString().padStart(2, '0');
                } else if (diff > -2000) {
                    beep(); nextBeepTime = null; document.getElementById('countdown').style.display = 'none';
                } else { document.getElementById('countdown').style.display = 'none'; }
            } else { document.getElementById('countdown').style.display = 'none'; }
        }, 50);

        function beep() {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 800; osc.start();
            setTimeout(() => osc.stop(), 800);
        }
    </script>
</body>
</html>
